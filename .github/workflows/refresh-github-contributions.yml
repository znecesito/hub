name: Refresh GitHub Contributions

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/fetch-github-contributions.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- public/data/github-contributions.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/github-contributions.json
          git commit -m "Refresh cached GitHub contribution data from latest build fetch."
          git push
